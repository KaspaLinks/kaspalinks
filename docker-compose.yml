services:
  app:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    environment:
      ADMIN_ACCESS_TOKEN: ${ADMIN_ACCESS_TOKEN}
      APP_COMMIT_SHA: ${APP_COMMIT_SHA:-}
      CREATOR_ACTION_DAILY_LIMIT: ${CREATOR_ACTION_DAILY_LIMIT:-50}
      CREATOR_SIGNUP_ENABLED: ${CREATOR_SIGNUP_ENABLED:-false}
      DATABASE_URL: ${DATABASE_URL}
      KASPA_INDEXER_ENABLED: ${KASPA_INDEXER_ENABLED:-false}
      KASPA_INDEXER_PROVIDER_ID: ${KASPA_INDEXER_PROVIDER_ID:-}
      KASPA_INDEXER_URL: ${KASPA_INDEXER_URL:-}
      KASPA_MAINNET_INDEXER_PROVIDER_ID: ${KASPA_MAINNET_INDEXER_PROVIDER_ID:-}
      KASPA_MAINNET_INDEXER_URL: ${KASPA_MAINNET_INDEXER_URL:-https://api.kaspa.org}
      KASPA_TESTNET_INDEXER_PROVIDER_ID: ${KASPA_TESTNET_INDEXER_PROVIDER_ID:-}
      KASPA_TESTNET_INDEXER_URL: ${KASPA_TESTNET_INDEXER_URL:-}
      MOCK_CONFIRM_ENABLED: ${MOCK_CONFIRM_ENABLED:-false}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
      NODE_ENV: production
      OPERATOR_ACCESS_LOG_DIR: ${OPERATOR_ACCESS_LOG_DIR:-/var/log/caddy}
      TOCCATA_LAB_ENABLED: ${TOCCATA_LAB_ENABLED:-false}
      TOCCATA_BATCH_LAB_ENABLED: ${TOCCATA_BATCH_LAB_ENABLED:-false}
      TOCCATA_WRPC_RELAY_URL: ${TOCCATA_WRPC_RELAY_URL:-http://toccata-relay:3010}
    expose:
      - "3000"
    volumes:
      - caddy_logs:/var/log/caddy:ro
    depends_on:
      postgres:
        condition: service_healthy
      toccata-relay:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "fetch(''http://127.0.0.1:3000/api/health'').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"',
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  toccata-relay:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: wrpc-relay
    restart: unless-stopped
    environment:
      NODE_ENV: production
      TOCCATA_RELAY_CONNECT_TIMEOUT_MS: ${TOCCATA_RELAY_CONNECT_TIMEOUT_MS:-30000}
      TOCCATA_RELAY_WARM_CONNECT_INTERVAL_MS: ${TOCCATA_RELAY_WARM_CONNECT_INTERVAL_MS:-60000}
      TOCCATA_RELAY_SUBMIT_TIMEOUT_MS: ${TOCCATA_RELAY_SUBMIT_TIMEOUT_MS:-20000}
    expose:
      - "3010"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "fetch(''http://127.0.0.1:3010/health'').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"',
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", 'pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    environment:
      ACME_EMAIL: ${ACME_EMAIL}
      BASIC_AUTH_HASH: ${BASIC_AUTH_HASH:-}
      DOMAIN: ${DOMAIN}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
      - caddy_logs:/data/logs
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "caddy", "validate", "--config", "/etc/caddy/Caddyfile"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  caddy_config:
  caddy_data:
  caddy_logs:
  postgres_data:
